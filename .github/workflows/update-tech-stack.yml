name: Update Tech Stack Badges

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tech-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch languages and update README
        env:
          GH_TOKEN: ${{ secrets.ORG_TOKEN }}
        run: |
          repos=$(gh api orgs/cntm-labs/repos --paginate --jq '.[].name')

          declare -A total
          for repo in $repos; do
            [ "$repo" = ".github" ] && continue
            langs=$(gh api "repos/cntm-labs/$repo/languages" 2>/dev/null || echo "{}")
            while IFS='=' read -r lang bytes; do
              [ -z "$lang" ] && continue
              total[$lang]=$(( ${total[$lang]:-0} + bytes ))
            done < <(echo "$langs" | jq -r 'to_entries[] | "\(.key)=\(.value)"')
          done

          badges=""
          for lang in $(for k in "${!total[@]}"; do echo "${total[$k]} $k"; done | sort -rn | awk '{print $2}'); do
            color="grey"
            case "$lang" in
              Java) color="ED8B00" ;;
              Rust) color="DEA584" ;;
              TypeScript) color="3178C6" ;;
              JavaScript) color="F7DF1E" ;;
              Dart) color="0175C2" ;;
              C) color="A8B9CC" ;;
              Go) color="00ADD8" ;;
              Python) color="3776AB" ;;
              HTML) color="E34F26" ;;
              CSS) color="1572B6" ;;
              Shell) color="4EAA25" ;;
              Nix) color="5277C3" ;;
              Assembly) color="6E4C13" ;;
              Kotlin) color="7F52FF" ;;
              Swift) color="F05138" ;;
              Ruby) color="CC342D" ;;
              Zig) color="F7A41D" ;;
            esac
            encoded=$(echo "$lang" | sed 's/ /%20/g')
            logo=$(echo "$lang" | tr '[:upper:]' '[:lower:]' | sed 's/ //g; s/#/%23/g; s/++/%2B%2B/g')
            badges="$badges![${lang}](https://img.shields.io/badge/${encoded}-${color}?style=flat-square&logo=${logo}&logoColor=white) "
          done

          awk -v badges="$badges" '
            /<!-- TECH-STACK:START -->/{print; print badges; skip=1; next}
            /<!-- TECH-STACK:END -->/{skip=0}
            !skip{print}
          ' profile/README.md > profile/README.tmp
          mv profile/README.tmp profile/README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet profile/README.md || {
            git add profile/README.md
            git commit -m "chore: auto-update tech stack badges"
            git push
          }
